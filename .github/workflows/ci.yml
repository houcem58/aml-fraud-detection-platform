name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint demo scripts
        run: ruff check demo/ --ignore E501

  demo-smoke-test:
    name: Demo Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run single transaction demo
        run: python demo/examples/01_single_transaction.py

      - name: Run network analysis demo
        run: python demo/examples/02_network_analysis.py

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install markdown link checker
        run: npm install -g markdown-link-check

      - name: Check internal links in docs
        run: |
          find docs/ -name "*.md" | xargs -I{} markdown-link-check {} \
            --config .github/mlc-config.json || true

      - name: Validate README structure
        run: |
          python - << 'EOF'
          import sys
          content = open("README.md").read()
          required = ["## The Problem", "## Architecture", "## Evaluation Results", "## Technology Stack"]
          missing = [s for s in required if s not in content]
          if missing:
              print(f"Missing sections: {missing}")
              sys.exit(1)
          print("✓ README structure valid")
          EOF
